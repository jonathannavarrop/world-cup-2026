<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORRA FANTASY - MUNDIAL DE LOS 2000 · Predicciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="nav"></div>
<div class="wrap">
  <header class="hero">
    <div class="eyebrow"><span class="flags">🇲🇽🇺🇸🇨🇦</span> Fase de grupos · Grupos A-L</div>
    <h1 class="title">PREDICCIONES <span class="accent">POR GRUPO</span></h1>
    <div class="subtitle">Todos los partidos de la fase de grupos, con el resultado oficial y, debajo, el pronóstico y los puntos de cada jugador.</div>
    <div class="meta" id="meta"></div>
  </header>

  <div class="view-toggle" id="viewToggle"></div>
  <div id="groups"><div class="empty">Cargando partidos…</div></div>
</div>

<script src="assets/app.js"></script>
<script>
renderNav("predicciones");

let view = 'calendario'; // 'calendario' | 'grupos' | 'fases'
let DATA = null;

// "2026-06-13 3:00" -> timestamp for chronological sorting
function matchDateKey(dateStr) {
  const m = (dateStr||'').match(/^(\d{4})-(\d{2})-(\d{2}) (\d{1,2}):(\d{2})$/);
  if (!m) return 0;
  const [, y, mo, d, h, mi] = m.map(Number);
  return new Date(y, mo - 1, d, h, mi).getTime();
}

function matchCard(m, showGroupTag){
  const score = m.played
    ? `<div class="match-score">${m.gh} - ${m.ga}</div>`
    : `<div class="match-score pending">vs</div>`;
  const preds = PLAYERS.map(p=>{
    const pr = (m.predictions||{})[p];
    const predScore = pr ? `${pr.gh}-${pr.ga}` : '—';
    return `<div class="pred-cell">
      <span class="player">${p}</span>
      <span class="pred-score">${predScore}</span>
      ${pr ? ptsHtml(pr.points) : '<span class="pts-na">—</span>'}
    </div>`;
  }).join('');
  const dateLabel = matchDateLabel(m.date);
  const groupTag = showGroupTag ? `<span class="match-group">Grupo ${m.group}</span>` : '';
  return `<div class="match-card">
    <div class="match-head">
      <div class="match-info">
        <div class="match-teams">${teamFlag(m.home)} ${teamES(m.home)} <span style="color:var(--muted)">vs</span> ${teamES(m.away)} ${teamFlag(m.away)}</div>
        ${(groupTag || dateLabel) ? `<div class="match-date">${groupTag}${dateLabel}</div>` : ''}
      </div>
      ${score}
    </div>
    <div class="preds-grid">${preds}</div>
  </div>`;
}

const KO_POINTS = { R32: 30, R16: 50, QF: 80, SF: 120, Final: 170 };
const GROUPS_LIST = ['A','B','C','D','E','F','G','H','I','J','K','L'];
const ROUND_LABELS_KO = { R16: 'Octavos de final', QF: 'Cuartos de final', SF: 'Semifinales', Final: 'Final' };

function render(){
  const matches = DATA.matches||[];

  let html;
  if (view === 'fases') {
    html = renderFases();
  } else if (view === 'calendario') {
    const sorted = matches.slice().sort((a,b) => matchDateKey(a.date) - matchDateKey(b.date) || a.num - b.num);
    html = sorted.map(m => matchCard(m, true)).join('');
  } else {
    const byGroup = {};
    for (const m of matches) (byGroup[m.group] = byGroup[m.group] || []).push(m);
    const groups = Object.keys(byGroup).sort();
    html = groups.map(g => `<section class="group-section">
      <div class="group-title">Grupo ${g}<span class="bar"></span></div>
      ${byGroup[g].map(m => matchCard(m, false)).join('')}
    </section>`).join('');
  }
  document.getElementById('groups').innerHTML = html || '<div class="empty">No hay partidos para este filtro.</div>';
}

function renderFases() {
  const advance     = DATA.advance || {};
  const actual      = DATA.actual_advanced || {};
  const finalSt     = DATA.final_standings || {};
  const predSt      = DATA.pred_standings || {};
  const groupsDone  = Object.keys(finalSt).length > 0;

  let html = '';

  // ── R32: organizado por grupo ──────────────────────────────────────────────
  html += `<section class="group-section">
    <div class="group-title">Dieciseisavos (R32)
      <span style="font-size:13px;font-family:'DM Sans',sans-serif;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">
        +30pts/equipo · +30pts bonus si aciertas la posición de grupo
      </span>
      <span class="bar"></span>
    </div>`;

  const actualR32 = actual.R32 || [];
  const r32Known  = actualR32.length > 0;

  for (const g of GROUPS_LIST) {
    const row1 = finalSt[`1${g}`]; const row2 = finalSt[`2${g}`];
    const team1 = row1 ? row1.team : null;
    const team2 = row2 ? row2.team : null;

    const posRows = [
      { pos: `1${g}`, label: '1º', actualTeam: team1 },
      { pos: `2${g}`, label: '2º', actualTeam: team2 },
    ];

    html += `<div class="match-card" style="margin-bottom:8px">
      <div style="font-family:'Anton',sans-serif;font-size:16px;color:var(--gold);margin-bottom:10px">Grupo ${g}</div>`;

    for (const { pos, label, actualTeam } of posRows) {
      const playerCells = PLAYERS.map(p => {
        const predTeam   = predSt[p] && predSt[p][pos] ? predSt[p][pos].team : null;
        const inR32list  = actualTeam && (advance[p]?.R32 || []).includes(actualTeam);
        const posMatch   = predTeam && actualTeam && predTeam === actualTeam;

        let icon, cls, showTeam;
        if (!groupsDone) {
          // grupo aún sin resultado
          showTeam = predTeam ? `${teamFlag(predTeam)} ${teamES(predTeam)}` : '—';
          icon = ''; cls = 'pts-na';
        } else if (r32Known) {
          // R32 oficial confirmado
          if (inR32list && posMatch)      { icon = '✔+b'; cls = 'pts-pos'; showTeam = `${teamFlag(actualTeam)} ${teamES(actualTeam)}`; }
          else if (inR32list)             { icon = '✔';   cls = 'pts-pos'; showTeam = `${teamFlag(actualTeam)} ${teamES(actualTeam)}`; }
          else { showTeam = predTeam ? `${teamFlag(predTeam)} ${teamES(predTeam)}` : '—'; icon = '✘'; cls = 'pts-neg'; }
        } else {
          // grupo terminado, R32 aún sin confirmar oficialmente → previsión
          if (posMatch)      { icon = '✔+b?'; cls = 'pts-pos'; showTeam = `${teamFlag(actualTeam)} ${teamES(actualTeam)}`; }
          else if (predTeam && actualTeam && (advance[p]?.R32 || []).includes(actualTeam)) {
            icon = '✔?'; cls = 'pts-pos'; showTeam = `${teamFlag(actualTeam)} ${teamES(actualTeam)}`;
          } else {
            showTeam = predTeam ? `${teamFlag(predTeam)} ${teamES(predTeam)}` : '—';
            icon = actualTeam ? '✘' : ''; cls = actualTeam ? 'pts-neg' : 'pts-na';
          }
        }

        return `<div class="pred-cell">
          <span class="player">${p}</span>
          <span class="${cls}" style="font-size:11px;white-space:nowrap">${showTeam}${icon ? ' <b>'+icon+'</b>' : ''}</span>
        </div>`;
      }).join('');

      const actualLabel = actualTeam
        ? `${teamFlag(actualTeam)} <b>${teamES(actualTeam)}</b>`
        : '<span style="color:var(--muted)">pendiente</span>';

      html += `<div style="display:grid;grid-template-columns:auto 1fr;gap:6px 10px;align-items:start;margin-bottom:6px">
        <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);white-space:nowrap;padding-top:7px">${label} ${actualLabel}</div>
        <div class="preds-grid">${playerCells}</div>
      </div>`;
    }

    html += `</div>`;
  }
  html += `</section>`;

  // ── R16, QF, SF, Final ────────────────────────────────────────────────────
  for (const rnd of ['R16','QF','SF','Final']) {
    const actualTeams = actual[rnd] || [];
    const isKnown = actualTeams.length > 0;
    const pts = KO_POINTS[rnd];

    const allTeams = new Set(actualTeams);
    for (const p of PLAYERS) for (const t of (advance[p]?.[rnd] || [])) allTeams.add(t);
    if (!allTeams.size) continue;

    const sorted = [...allTeams].sort((a,b) => {
      const ah = actualTeams.includes(a), bh = actualTeams.includes(b);
      return (ah===bh) ? teamES(a).localeCompare(teamES(b),'es') : (ah ? -1 : 1);
    });

    html += `<section class="group-section">
      <div class="group-title">${ROUND_LABELS_KO[rnd]}
        <span style="font-size:13px;font-family:'DM Sans',sans-serif;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">+${pts}pts/equipo</span>
        <span class="bar"></span>
      </div>`;

    for (const team of sorted) {
      const advanced = actualTeams.includes(team);
      const fade = isKnown && !advanced ? 'opacity:.5' : '';
      const resultBadge = !isKnown
        ? `<span class="tag pending">Pendiente</span>`
        : (advanced ? `<span class="pts-pos" style="font-family:'Space Mono',monospace;font-weight:700">✔ +${pts}pts</span>`
                    : `<span class="pts-neg" style="font-family:'Space Mono',monospace;font-weight:700">✘</span>`);

      const playerCells = PLAYERS.map(p => {
        const picked = (advance[p]?.[rnd] || []).includes(team);
        let val, cls;
        if (!picked)        { val = '—';        cls = 'pts-na'; }
        else if (!isKnown)  { val = '✓ pick';   cls = 'pts-na'; }
        else if (advanced)  { val = `+${pts}pts`; cls = 'pts-pos'; }
        else                { val = '✘';        cls = 'pts-neg'; }
        return `<div class="pred-cell"><span class="player">${p}</span><span class="${cls}">${val}</span></div>`;
      }).join('');

      html += `<div class="match-card" style="margin-bottom:8px;${fade}">
        <div class="match-head">
          <div class="match-teams">${teamFlag(team)} ${teamES(team)}</div>
          ${resultBadge}
        </div>
        <div class="preds-grid" style="margin-top:10px;padding-top:8px;border-top:1px dashed var(--line)">${playerCells}</div>
      </div>`;
    }
    html += `</section>`;
  }

  // ── Campeón ───────────────────────────────────────────────────────────────
  const actualChamp = (actual.Champion || [])[0];
  const champKnown = !!actualChamp;
  const champCells = PLAYERS.map(p => {
    const pick = (advance[p]?.Champion || [])[0];
    const hit = champKnown && pick === actualChamp;
    const cls = !pick ? 'pts-na' : (!champKnown ? 'pts-na' : (hit ? 'pts-pos' : 'pts-neg'));
    return `<div class="pred-cell" style="flex-direction:column;align-items:flex-start;gap:2px;padding:10px">
      <span class="player">${p}</span>
      <span style="font-size:14px">${pick ? teamFlag(pick)+' '+teamES(pick) : '—'}</span>
      <span class="${cls} " style="font-size:12px">${!pick ? '—' : (!champKnown ? 'pendiente' : (hit ? '+250pts ✔' : '✘'))}</span>
    </div>`;
  }).join('');

  html += `<section class="group-section">
    <div class="group-title">Campeón
      <span style="font-size:13px;font-family:'DM Sans',sans-serif;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">+250pts</span>
      <span class="bar"></span>
    </div>
    <div class="match-card">
      ${champKnown ? `<p style="margin-bottom:12px;font-family:'Space Mono',monospace;font-size:13px">Campeón: <b style="color:var(--gold)">${teamFlag(actualChamp)} ${teamES(actualChamp)}</b></p>` : '<p style="margin-bottom:12px;color:var(--muted);font-family:\'Space Mono\',monospace;font-size:12px">Campeón pendiente</p>'}
      <div class="preds-grid" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))">${champCells}</div>
    </div>
  </section>`;

  return html;
}

function renderControls(){
  document.getElementById('viewToggle').innerHTML = `
    <button data-view="calendario" class="${view==='calendario'?'active':''}">📅 Calendario</button>
    <button data-view="grupos" class="${view==='grupos'?'active':''}">Por grupos</button>
    <button data-view="fases" class="${view==='fases'?'active':''}">🏆 Fases Finales</button>`;
  document.querySelectorAll('#viewToggle button').forEach(b =>
    b.addEventListener('click', () => { view = b.dataset.view; renderControls(); render(); }));
}

async function load(){
  try{ DATA = await fetchJSON('./data/standings.json'); }
  catch(e){ document.getElementById('groups').innerHTML =
    '<div class="empty">Aún no hay datos publicados.</div>'; return; }

  const upd = DATA.updated ? new Date(DATA.updated).toLocaleString('es-ES') : '—';
  document.getElementById('meta').innerHTML =
    `<span><b>${(DATA.matches||[]).length}</b> partidos de grupos</span>
     <span><b>${DATA.matches_played||0}</b> jugados</span>
     <span>Actualizado: ${upd}</span>`;

  renderControls();
  render();
}
load();
</script>
</body>
</html>
