<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORRA FANTASY - MUNDIAL DE LOS 2000 · Predicciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="nav"></div>
<div class="wrap">
  <header class="hero">
    <div class="eyebrow"><span class="flags">🇲🇽🇺🇸🇨🇦</span> Fase de grupos · Grupos A-L</div>
    <h1 class="title">PREDICCIONES <span class="accent">POR GRUPO</span></h1>
    <div class="subtitle">Todos los partidos de la fase de grupos, con el resultado oficial y, debajo, el pronóstico y los puntos de cada jugador.</div>
    <div class="meta" id="meta"></div>
  </header>

  <div class="view-toggle" id="viewToggle"></div>
  <div id="groups"><div class="empty">Cargando partidos…</div></div>
</div>

<script src="assets/app.js"></script>
<script>
renderNav("predicciones");

let view = 'calendario'; // 'calendario' | 'fases'
let fasesRound = 'R32'; // 'R32' | 'R16' | 'QF' | 'SF' | 'Final' | 'Champion'
let DATA = null;

// "2026-06-13 3:00" -> timestamp for chronological sorting
function matchDateKey(dateStr) {
  const m = (dateStr||'').match(/^(\d{4})-(\d{2})-(\d{2}) (\d{1,2}):(\d{2})$/);
  if (!m) return 0;
  const [, y, mo, d, h, mi] = m.map(Number);
  return new Date(y, mo - 1, d, h, mi).getTime();
}

function matchCard(m, showGroupTag){
  const score = m.played
    ? `<div class="match-score">${m.gh} - ${m.ga}</div>`
    : `<div class="match-score pending">vs</div>`;
  const preds = PLAYERS.map(p=>{
    const pr = (m.predictions||{})[p];
    const predScore = pr ? `${pr.gh}-${pr.ga}` : '—';
    return `<div class="pred-cell">
      <span class="player">${p}</span>
      <span class="pred-score">${predScore}</span>
      ${pr ? ptsHtml(pr.points) : '<span class="pts-na">—</span>'}
    </div>`;
  }).join('');
  const dateLabel = matchDateLabel(m.date);
  const groupTag = showGroupTag ? `<span class="match-group">Grupo ${m.group}</span>` : '';
  return `<div class="match-card">
    <div class="match-head">
      <div class="match-info">
        <div class="match-teams">${teamFlag(m.home)} ${teamES(m.home)} <span style="color:var(--muted)">vs</span> ${teamES(m.away)} ${teamFlag(m.away)}</div>
        ${(groupTag || dateLabel) ? `<div class="match-date">${groupTag}${dateLabel}</div>` : ''}
      </div>
      ${score}
    </div>
    <div class="preds-grid">${preds}</div>
  </div>`;
}

const KO_POINTS = { R32: 30, R16: 50, QF: 80, SF: 120, Final: 170 };
const GROUPS_LIST = ['A','B','C','D','E','F','G','H','I','J','K','L'];
const ROUND_LABELS_KO = { R32: 'Dieciseisavos', R16: 'Octavos de final', QF: 'Cuartos de final', SF: 'Semifinales', Final: 'Final', Champion: 'Campeón' };
const ROUND_PTS = { R32: '+30pts (+30 bonus posición)', R16: '+50pts/equipo', QF: '+80pts/equipo', SF: '+120pts/equipo', Final: '+170pts/equipo', Champion: '+250pts' };

function render(){
  const matches = DATA.matches||[];
  let html;
  if (view === 'fases') {
    html = renderFases();
  } else {
    const sorted = matches.slice().sort((a,b) => matchDateKey(a.date) - matchDateKey(b.date) || a.num - b.num);
    html = sorted.map(m => matchCard(m, true)).join('');
  }
  document.getElementById('groups').innerHTML = html || '<div class="empty">No hay partidos para este filtro.</div>';
}

function renderFasesRoundFilter() {
  const rounds = ['R32','R16','QF','SF','Final','Champion'];
  const labels = { R32:'Dieciseisavos', R16:'Octavos', QF:'Cuartos', SF:'Semis', Final:'Final', Champion:'Campeón' };
  return `<div class="group-filter" id="fasesFilter">
    ${rounds.map(r => `<button data-round="${r}" class="${fasesRound===r?'active':''}">${labels[r]}</button>`).join('')}
  </div>`;
}

function renderFases() {
  const advance  = DATA.advance || {};
  const actual   = DATA.actual_advanced || {};
  const finalSt  = DATA.final_standings || {};
  const predSt   = DATA.pred_standings || {};

  let html = renderFasesRoundFilter();

  if (fasesRound === 'R32') {
    html += renderR32(advance, actual, finalSt, predSt);
  } else if (fasesRound === 'Champion') {
    html += renderChampionSection(advance, actual);
  } else {
    html += renderKORound(fasesRound, advance, actual);
  }

  // bind round filter clicks after DOM insert (setTimeout 0)
  setTimeout(() => {
    document.querySelectorAll('#fasesFilter button').forEach(b =>
      b.addEventListener('click', () => { fasesRound = b.dataset.round; render(); }));
  }, 0);

  return html;
}

const TH_STYLE = `font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:400;padding:6px 10px;border-bottom:1px solid var(--line)`;

function renderR32(advance, actual, finalSt, predSt) {
  const actualR32 = actual.R32 || [];
  const r32Known  = actualR32.length > 0;

  // equipo → código de posición real, p.ej. "Mexico" → "1A"
  const actualPosOf = {};
  for (const [code, v] of Object.entries(finalSt)) {
    if (v && v.team) actualPosOf[v.team] = code;
  }

  // jugador → equipo → código de posición predicha
  const predPosOf = {};
  for (const p of PLAYERS) {
    predPosOf[p] = {};
    for (const [code, v] of Object.entries(predSt[p] || {})) {
      if (v && v.team) predPosOf[p][v.team] = code;
    }
  }

  const totalPts = Object.fromEntries(PLAYERS.map(p => [p, 0]));
  let rows = '';

  for (const g of GROUPS_LIST) {
    // Recoge los equipos de este grupo que aparecen en la tabla
    const slots = [];
    for (const rank of [1, 2, 3]) {
      const code = `${rank}${g}`;
      const v    = finalSt[code];
      if (!v) continue;
      const team     = v.team;
      const qualifies = r32Known ? actualR32.includes(team) : rank <= 2;
      if (rank === 3 && !qualifies) continue; // 3os que no clasificaron: ocultar
      slots.push({ rank, code, team, qualifies });
    }
    if (!slots.length) continue;

    // Cabecera de grupo
    rows += `<tr>
      <td colspan="${2 + PLAYERS.length}" style="padding:5px 10px 3px;font-family:'Anton',sans-serif;font-size:13px;color:var(--gold);background:rgba(255,200,0,.05);border-top:2px solid rgba(255,200,0,.15)">
        GRUPO ${g}
      </td>
    </tr>`;

    for (const { rank, code, team, qualifies } of slots) {
      const is3rd  = rank === 3;
      const badge  = is3rd ? '3° ★' : `${rank}°`;
      const rankStyle = is3rd ? 'color:var(--gold);font-weight:700' : 'color:var(--muted)';

      const statusBadge = !r32Known
        ? `<span class="tag pending" style="font-size:10px">pdte</span>`
        : (qualifies
            ? `<span class="pts-pos" style="font-size:11px">✔</span>`
            : `<span class="pts-neg" style="font-size:11px">✘</span>`);

      const playerCells = PLAYERS.map(p => {
        const picked = (advance[p]?.R32 || []).includes(team);

        // Grupo aún sin resultado conocido
        if (!r32Known) {
          return `<td style="text-align:center;padding:6px 8px">
            ${picked ? '<span class="pts-na">pick</span>' : '<span class="pts-na">—</span>'}
          </td>`;
        }

        // Equipo no clasificó
        if (!qualifies) {
          return `<td style="text-align:center;padding:6px 8px;opacity:.5">
            ${picked ? '<span class="pts-neg">0pts</span>' : '<span class="pts-na">—</span>'}
          </td>`;
        }

        // Clasificó pero el jugador no lo tenía en su lista
        if (!picked) {
          return `<td style="text-align:center;padding:6px 8px"><span class="pts-na">—</span></td>`;
        }

        // Clasificó Y estaba en la lista del jugador → puntos
        const posOk = predPosOf[p][team] === code; // además acertó la posición en el grupo
        const pts   = 30 + (posOk ? 30 : 0);
        totalPts[p] += pts;

        const detail = posOk
          ? `<span class="pts-pos" style="display:block">+30pts</span><span class="pts-pos" style="display:block">+30pts</span><span style="font-size:10px;color:var(--muted)">avance + pos</span>`
          : `<span class="pts-pos" style="display:block">+30pts</span><span style="font-size:10px;color:var(--muted)">avance</span>`;

        return `<td style="text-align:center;padding:6px 8px;line-height:1.5;background:rgba(0,255,133,.06)">${detail}</td>`;
      }).join('');

      rows += `<tr style="border-bottom:1px solid rgba(44,53,104,.3)">
        <td style="padding:6px 10px;font-family:'Space Mono',monospace;font-size:11px;${rankStyle}">${badge}</td>
        <td style="padding:6px 10px;white-space:nowrap">${teamFlag(team)} ${teamES(team)} ${statusBadge}</td>
        ${playerCells}
      </tr>`;
    }
  }

  // Fila resumen
  const summaryRow = `<tr style="border-top:2px solid var(--line);background:rgba(255,255,255,.03)">
    <td colspan="2" style="padding:8px 10px;font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)">Puntos R32</td>
    ${PLAYERS.map(p => `<td style="text-align:center;padding:8px;font-weight:700">${ptsHtml(totalPts[p])}</td>`).join('')}
  </tr>`;

  const playerThs = PLAYERS.map(p =>
    `<th style="${TH_STYLE};text-align:center">${p}</th>`
  ).join('');

  return `<div class="match-card" style="overflow-x:auto;padding:10px 4px">
    <p style="font-size:11px;color:var(--muted);padding:4px 8px 10px;font-family:'Space Mono',monospace">
      +30pts por equipo en tu lista R32 · +30pts bonus si acertaste su posición en el grupo · ★ = mejor 3er clasificado
    </p>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr>
        <th style="${TH_STYLE}">Pos</th>
        <th style="${TH_STYLE}">Clasificado real</th>
        ${playerThs}
      </tr></thead>
      <tbody>${rows}${summaryRow}</tbody>
    </table>
  </div>`;
}

function renderKORound(rnd, advance, actual) {
  const actualTeams = actual[rnd] || [];
  const isKnown = actualTeams.length > 0;
  const pts = KO_POINTS[rnd];

  const allTeams = new Set(actualTeams);
  for (const p of PLAYERS) for (const t of (advance[p]?.[rnd] || [])) allTeams.add(t);
  if (!allTeams.size) return `<div class="empty">Aún no hay picks ni resultados para esta ronda.</div>`;

  const sorted = [...allTeams].sort((a,b) => {
    const ah = actualTeams.includes(a), bh = actualTeams.includes(b);
    return (ah===bh) ? teamES(a).localeCompare(teamES(b),'es') : (ah ? -1 : 1);
  });

  const playerThs = PLAYERS.map(p =>
    `<th style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:400;padding:6px 10px;border-bottom:1px solid var(--line);text-align:center">${p}</th>`
  ).join('');

  const rows = sorted.map(team => {
    const advanced = actualTeams.includes(team);
    const fade = isKnown && !advanced ? 'opacity:.5' : '';
    const resultLabel = !isKnown
      ? `<span class="tag pending">pdte</span>`
      : (advanced ? `<span class="pts-pos">✔</span>` : `<span class="pts-neg">✘</span>`);

    const playerCells = PLAYERS.map(p => {
      const picked = (advance[p]?.[rnd] || []).includes(team);
      let cell;
      if (!picked)       cell = `<span class="pts-na">—</span>`;
      else if (!isKnown) cell = `<span class="pts-na">pick</span>`;
      else if (advanced) cell = ptsHtml(pts);
      else               cell = `<span class="pts-neg">0pts</span>`;
      return `<td style="text-align:center;padding:7px 8px;${fade}">${cell}</td>`;
    }).join('');

    return `<tr style="border-bottom:1px solid rgba(44,53,104,.4)">
      <td style="padding:7px 10px;${fade}">${teamFlag(team)} ${teamES(team)}</td>
      <td style="text-align:center;padding:7px 10px;${fade}">${resultLabel}</td>
      ${playerCells}
    </tr>`;
  }).join('');

  return `<div class="match-card" style="overflow-x:auto;padding:10px 4px">
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr>
        <th style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:400;padding:6px 10px;border-bottom:1px solid var(--line)">Equipo</th>
        <th style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:400;padding:6px 10px;border-bottom:1px solid var(--line);text-align:center">Resultado</th>
        ${playerThs}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderChampionSection(advance, actual) {
  const actualChamp = (actual.Champion || [])[0];
  const champKnown = !!actualChamp;

  const rows = PLAYERS.map(p => {
    const pick = (advance[p]?.Champion || [])[0];
    const hit = champKnown && pick === actualChamp;
    let cell;
    if (!pick)         cell = `<span class="pts-na">Sin pick</span>`;
    else if (!champKnown) cell = `<span class="pts-na">pendiente</span>`;
    else if (hit)      cell = ptsHtml(250);
    else               cell = `<span class="pts-neg">0pts</span>`;
    return `<tr style="border-bottom:1px solid rgba(44,53,104,.4)">
      <td style="padding:8px 10px">${p}</td>
      <td style="padding:8px 10px">${pick ? teamFlag(pick)+' '+teamES(pick) : '—'}</td>
      <td style="text-align:center;padding:8px 10px">${cell}</td>
    </tr>`;
  }).join('');

  return `<div class="match-card" style="overflow-x:auto;padding:10px 4px">
    ${champKnown ? `<p style="margin-bottom:12px;font-family:'Space Mono',monospace;font-size:13px;padding:0 6px">Campeón: <b style="color:var(--gold)">${teamFlag(actualChamp)} ${teamES(actualChamp)}</b></p>` : ''}
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr>
        <th style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:400;padding:6px 10px;border-bottom:1px solid var(--line)">Jugador</th>
        <th style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:400;padding:6px 10px;border-bottom:1px solid var(--line)">Pick</th>
        <th style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:400;padding:6px 10px;border-bottom:1px solid var(--line);text-align:center">Puntos</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderControls(){
  document.getElementById('viewToggle').innerHTML = `
    <button data-view="calendario" class="${view==='calendario'?'active':''}">Fase de grupos</button>
    <button data-view="fases" class="${view==='fases'?'active':''}">🏆 Fases Finales</button>`;
  document.querySelectorAll('#viewToggle button').forEach(b =>
    b.addEventListener('click', () => { view = b.dataset.view; renderControls(); render(); }));
}

async function load(){
  try{ DATA = await fetchJSON('./data/standings.json'); }
  catch(e){ document.getElementById('groups').innerHTML =
    '<div class="empty">Aún no hay datos publicados.</div>'; return; }

  const upd = DATA.updated ? new Date(DATA.updated).toLocaleString('es-ES') : '—';
  document.getElementById('meta').innerHTML =
    `<span><b>${(DATA.matches||[]).length}</b> partidos de grupos</span>
     <span><b>${DATA.matches_played||0}</b> jugados</span>
     <span>Actualizado: ${upd}</span>`;

  renderControls();
  render();
}
load();
</script>
</body>
</html>
